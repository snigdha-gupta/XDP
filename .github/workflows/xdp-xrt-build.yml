name: XDP Build

on:
  push: 
    branches: [ edge_yml ] # test branch
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ master ]
    
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
  
jobs:
  build-xrt-alveo:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout XDP PR
      uses: actions/checkout@v4
      with:
        path: xdp-pr
        fetch-depth: 0
        
    - name: Clone XRT Repository
      run: |
        git clone https://github.com/Xilinx/XRT.git XRT
        cd XRT
        git submodule update --init --recursive
        
    - name: Apply XDP PR Changes to XRT
      run: |
        rm -rf XRT/src/runtime_src/xdp
        cp -r xdp-pr XRT/src/runtime_src/xdp
        
    - name: Setup Build Environment Using XRT Scripts
      run: |
        cd XRT/src/runtime_src/tools/scripts
        chmod +x xrtdeps.sh
        sudo ./xrtdeps.sh
        # Install cross-compilation tools for edge builds
        sudo apt-get update
        sudo apt-get install -y \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          crossbuild-essential-arm64
        
    - name: Build XRT for Alveo
      run: |
        cd XRT/build
        chmod +x build.sh
        ./build.sh -noinit -noert
        
    - name: Validate build
      run: |
        if ls XRT/build/Release/opt/xilinx/xrt/lib/libxrt_core.so* 1> /dev/null 2>&1; then
          echo "✓ XRT Build successful"
        else
          echo "✗ XRT Build failed"
          exit 1
        fi
        
        if ls XRT/build/Release/opt/xilinx/xrt/lib/libxdp_core.so* 1> /dev/null 2>&1; then
          echo "✓ XDP Build successful"
        else
          echo "✗ XDP Build failed"
          exit 1
        fi
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xrt-alveo-build-PR-${{ github.event.pull_request.number }}
        path: |
          XRT/build/Release/opt/xilinx/xrt/lib/libxrt*.so*
          XRT/build/Release/opt/xilinx/xrt/lib/libxdp*.so*
          XRT/build/Release/opt/xilinx/xrt/lib/xrt/module/*.so*
        retention-days: 1
        if-no-files-found: warn

    - name: Generate Build Summary
      if: always()
      run: |
        echo "## XDP Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Build Date: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- XDP Source: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

        if ls XRT/build/Release/opt/xilinx/xrt/lib/libxrt_core.so* 1> /dev/null 2>&1; then
          echo "- XRT Build: ✅ Success" >> $GITHUB_STEP_SUMMARY
        else
          echo "- XRT Build: ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi

        if ls XRT/build/Release/opt/xilinx/xrt/lib/libxdp_core.so* 1> /dev/null 2>&1; then
          echo "- XDP Build: ✅ Success" >> $GITHUB_STEP_SUMMARY
        else
          echo "- XDP Build: ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi
            
  # Edge build: same as XRT (xrt_ci.yml apu-package-build + build-action index.js L77-79).
  # Uses runs-on: apu so the runner has /proj/petalinux, /proj/xbuilds, etc. on the host; they are mounted into the container.
  # Layout: XRT tree at workspace/run_number (like XRT checkout path) so it matches build-action's workspace/buildNumber.
  build-xrt-edge:
    if: github.event_name == 'push'
    runs-on: apu
    timeout-minutes: 120
    env:
      RELEASE: ${{ vars.XRT_RELEASE }}
      # Same volume inputs as build-action (runner must have these paths); override via repo vars if needed
      TOOLS_BATONROOT: "-v /tools/batonroot:/tools/batonroot"
      PROJ: "-v /proj/xbb:/proj/xbb"
      PROJ_XBUILDS: "-v /proj/xbuilds:/proj/xbuilds"
    steps:
      - name: Set env variables
        run: |
          echo "XRT_VERSION_PATCH=${{ github.run_number }}" >> $GITHUB_ENV
          echo "PATH=/usr/bin:$PATH" >> $GITHUB_ENV
          echo "RELEASE=${RELEASE:-2024.2}" >> $GITHUB_ENV

      - name: Clone XRT at workspace/run_number (same layout as XRT: build-action expects repo at workspace/buildNumber)
        run: |
          git clone https://github.com/Xilinx/XRT.git "${{ github.workspace }}/${{ github.run_number }}"
          cd "${{ github.workspace }}/${{ github.run_number }}"
          git submodule update --init --recursive

      - name: Checkout XDP PR and apply into XRT tree (same pattern as XRT apu-package-build)
        uses: actions/checkout@v4
        with:
          path: xdp-pr
          fetch-depth: 0

      - name: Apply XDP into XRT tree
        run: |
          rm -rf "${{ github.workspace }}/${{ github.run_number }}/src/runtime_src/xdp"
          cp -r "${{ github.workspace }}/xdp-pr" "${{ github.workspace }}/${{ github.run_number }}/src/runtime_src/xdp"

      - name: Prepare APU tmp dir (build_action creates workspace/tmp_buildNumber/apu)
        run: mkdir -p "${{ github.workspace }}/tmp_${{ github.run_number }}/apu"

      - name: Pull edge build Docker image (build_action L18)
        run: docker pull artifactory.xilinx.com/devops/embedded-platform-ubuntu-latest-20.04

      - name: Build for edge (same docker run as build_action index.js L79, build_edge.sh -aarch versal -full)
        env:
          WORKSPACE: ${{ github.workspace }}
          BUILD_NUM: ${{ github.run_number }}
          SETTINGS_PATH: /proj/xbuilds/CustTA/${{ env.RELEASE }}_daily_latest/installs/lin64/${{ env.RELEASE }}/Vitis
        run: |
          docker run --rm \
            -u xbuild \
            ${{ env.TOOLS_BATONROOT }} \
            ${{ env.PROJ }} \
            -v /group/sw:/group/sw \
            -v /group/xcofarm:/group/xcofarm \
            -v /proj/dsv:/proj/dsv \
            -v /proj/petalinux:/proj/petalinux \
            -v /proj/rdi-xco:/proj/rdi-xco \
            ${{ env.PROJ_XBUILDS }} \
            -v /proj/yocto:/proj/yocto \
            -v /var/lib/nfs/rpc_pipefs:/var/lib/nfs/rpc_pipefs \
            -v /home/xbuild:/home/xbuild \
            -v /tools/baton:/tools/baton \
            -v /tools/xint:/tools/xint \
            -v /wrk/HEAD:/wrk/HEAD \
            -v /wrk/ci:/wrk/ci \
            -v ${WORKSPACE}/${BUILD_NUM}:/opt/xrt \
            -w /opt/xrt/build \
            -v ${WORKSPACE}/tmp_${BUILD_NUM}/apu:/tmp \
            -e XRT_VERSION_PATCH=${BUILD_NUM} \
            artifactory.xilinx.com/devops/embedded-platform-ubuntu-latest-20.04 \
            bash -c "unset http_proxy https_proxy && source ${SETTINGS_PATH}/settings64.sh && /opt/xrt/build/build_edge.sh -aarch versal -full"

      - name: Edge build summary
        if: always()
        run: |
          echo "## XDP Edge Build Summary (same as XRT apu-package + build_action)" >> $GITHUB_STEP_SUMMARY
          echo "- Runner: apu (host has /proj/petalinux, etc.; mounted into container)" >> $GITHUB_STEP_SUMMARY
          echo "- Image: artifactory.xilinx.com/devops/embedded-platform-ubuntu-latest-20.04" >> $GITHUB_STEP_SUMMARY
          echo "- Command: build_edge.sh -aarch versal -full" >> $GITHUB_STEP_SUMMARY

  # Future job for client builds
  build-xrt-client:
    if: contains(github.event.pull_request.labels.*.name, 'build-client')
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder for client build
        run: echo "Client build would go here"

  # Future job for ve2 builds  
  build-xrt-ve2:
    if: contains(github.event.pull_request.labels.*.name, 'build-ve2')
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder for ve2 build
        run: echo "VE2 build would go here"

