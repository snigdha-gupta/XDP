name: XDP Build

on:
  push: 
    branches: [ edge_yml ] # test branch
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ master ]
    
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
  
jobs:
  build-xrt-alveo:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout XDP PR
      uses: actions/checkout@v4
      with:
        path: xdp-pr
        fetch-depth: 0
        
    - name: Clone XRT Repository
      run: |
        git clone https://github.com/Xilinx/XRT.git XRT
        cd XRT
        git submodule update --init --recursive
        
    - name: Apply XDP PR Changes to XRT
      run: |
        rm -rf XRT/src/runtime_src/xdp
        cp -r xdp-pr XRT/src/runtime_src/xdp
        
    - name: Setup Build Environment Using XRT Scripts
      run: |
        cd XRT/src/runtime_src/tools/scripts
        chmod +x xrtdeps.sh
        sudo ./xrtdeps.sh
        # Install cross-compilation tools for edge builds
        sudo apt-get update
        sudo apt-get install -y \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          crossbuild-essential-arm64
        
    - name: Build XRT for Alveo
      run: |
        cd XRT/build
        chmod +x build.sh
        ./build.sh -noinit -noert
        
    - name: Validate build
      run: |
        if ls XRT/build/Release/opt/xilinx/xrt/lib/libxrt_core.so* 1> /dev/null 2>&1; then
          echo "✓ XRT Build successful"
        else
          echo "✗ XRT Build failed"
          exit 1
        fi
        
        if ls XRT/build/Release/opt/xilinx/xrt/lib/libxdp_core.so* 1> /dev/null 2>&1; then
          echo "✓ XDP Build successful"
        else
          echo "✗ XDP Build failed"
          exit 1
        fi
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xrt-alveo-build-PR-${{ github.event.pull_request.number }}
        path: |
          XRT/build/Release/opt/xilinx/xrt/lib/libxrt*.so*
          XRT/build/Release/opt/xilinx/xrt/lib/libxdp*.so*
          XRT/build/Release/opt/xilinx/xrt/lib/xrt/module/*.so*
        retention-days: 1
        if-no-files-found: warn

    - name: Generate Build Summary
      if: always()
      run: |
        echo "## XDP Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Build Date: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- XDP Source: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

        if ls XRT/build/Release/opt/xilinx/xrt/lib/libxrt_core.so* 1> /dev/null 2>&1; then
          echo "- XRT Build: ✅ Success" >> $GITHUB_STEP_SUMMARY
        else
          echo "- XRT Build: ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi

        if ls XRT/build/Release/opt/xilinx/xrt/lib/libxdp_core.so* 1> /dev/null 2>&1; then
          echo "- XDP Build: ✅ Success" >> $GITHUB_STEP_SUMMARY
        else
          echo "- XDP Build: ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi
            
  # Edge build: uses XRT's Docker image (build_action L18); /proj/petalinux etc. are inside the image, not mounted from host.
  build-xrt-edge:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Optional: set XRT_RELEASE repo variable if the image uses a different Vitis path
      RELEASE: ${{ vars.XRT_RELEASE }}
    steps:
      - name: Checkout XDP PR
        uses: actions/checkout@v4
        with:
          path: xdp-pr
          fetch-depth: 0

      - name: Clone XRT Repository
        run: |
          git clone https://github.com/Xilinx/XRT.git XRT
          cd XRT
          git submodule update --init --recursive

      - name: Apply XDP PR Changes to XRT
        run: |
          rm -rf XRT/src/runtime_src/xdp
          cp -r xdp-pr XRT/src/runtime_src/xdp

      - name: Set release for Vitis settings path (inside image)
        run: |
          echo "RELEASE=${RELEASE:-2024.2}" >> $GITHUB_ENV

      - name: Prepare APU workspace dir
        run: mkdir -p "${{ github.workspace }}/tmp_${{ github.run_number }}/apu"

      - name: Pull edge build Docker image (same as XRT build_action L18)
        run: |
          docker pull artifactory.xilinx.com/devops/embedded-platform-ubuntu-latest-20.04

      # Only mount workspace; /proj/petalinux, Vitis, etc. are inside the image.
      - name: Build for edge (build_edge.sh -aarch versal)
        env:
          WORKSPACE: ${{ github.workspace }}
          BUILD_NUM: ${{ github.run_number }}
          SETTINGS_PATH: /proj/xbuilds/CustTA/${{ env.RELEASE }}_daily_latest/installs/lin64/${{ env.RELEASE }}/Vitis
        run: |
          docker run --rm \
            -u xbuild \
            -v ${WORKSPACE}/XRT:/opt/xrt \
            -w /opt/xrt/build \
            -v ${WORKSPACE}/tmp_${BUILD_NUM}/apu:/tmp \
            -e XRT_VERSION_PATCH=${BUILD_NUM} \
            artifactory.xilinx.com/devops/embedded-platform-ubuntu-latest-20.04 \
            bash -c "unset http_proxy https_proxy && source ${SETTINGS_PATH}/settings64.sh && /opt/xrt/build/build_edge.sh -aarch versal -full"

      - name: Edge build summary
        if: always()
        run: |
          echo "## XDP Edge Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Image: artifactory.xilinx.com/devops/embedded-platform-ubuntu-latest-20.04 (paths like /proj/petalinux are inside the image)" >> $GITHUB_STEP_SUMMARY
          echo "- Command: build_edge.sh -aarch versal -full" >> $GITHUB_STEP_SUMMARY

  # Future job for client builds
  build-xrt-client:
    if: contains(github.event.pull_request.labels.*.name, 'build-client')
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder for client build
        run: echo "Client build would go here"

  # Future job for ve2 builds  
  build-xrt-ve2:
    if: contains(github.event.pull_request.labels.*.name, 'build-ve2')
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder for ve2 build
        run: echo "VE2 build would go here"

